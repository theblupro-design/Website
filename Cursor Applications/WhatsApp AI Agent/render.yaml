services:
  - type: web
    name: alphabot-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci && npm run build --workspace=packages/shared --workspace=packages/database --workspace=apps/api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: META_WHATSAPP_TOKEN
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: API_PORT
        value: "4000"
      - key: WEB_BASE_URL
        sync: false
